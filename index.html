<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpressBot UMB</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --espresso: #2C1A0E;
    --roast: #5C3317;
    --caramel: #C8854A;
    --latte: #E8C99A;
    --cream: #F5ECD7;
    --foam: #FAF5ED;
    --white: #FFFFFF;
    --chat-bot: #EDE0CC;
    --chat-user: #5C3317;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0f06;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-image: radial-gradient(ellipse at 20% 50%, #3d1f0a 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, #2a1208 0%, transparent 50%);
  }

  /* PHONE MOCKUP */
  .phone {
    width: 375px;
    height: 812px;
    background: var(--foam);
    border-radius: 50px;
    box-shadow:
      0 0 0 10px #0d0704,
      0 0 0 12px #3a2010,
      0 40px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Notch */
  .phone::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 130px; height: 30px;
    background: #0d0704;
    border-radius: 0 0 20px 20px;
    z-index: 100;
  }

  /* HEADER */
  .header {
    background: var(--espresso);
    padding: 50px 24px 20px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 20px;
    background: var(--foam);
    border-radius: 20px 20px 0 0;
  }

  .header-texture {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle at 80% 20%, rgba(200,133,74,0.15) 0%, transparent 50%);
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    position: relative;
  }

  .brand-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }

  .brand-label {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }

  .greeting {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 21px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.3;
    position: relative;
    letter-spacing: -0.02em;
  }

  .greeting span {
    color: var(--caramel);
  }

  .subline {
    font-size: 13px;
    color: rgba(255,255,255,0.38);
    margin-top: 6px;
    position: relative;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px 8px;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(92,51,23,0.08);
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--roast);
    font-weight: 500;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #a0a0a0;
    transition: background 0.3s;
  }

  .status-dot.active { background: #4CAF50; }
  .status-dot.listening {
    background: var(--caramel);
    animation: pulse-dot 1s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .clear-btn {
    font-size: 11px;
    color: var(--caramel);
    cursor: pointer;
    font-weight: 500;
    border: none; background: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 0; }

  /* BUBBLES */
  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.5;
    animation: pop-in 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes pop-in {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .bubble-bot {
    background: var(--chat-bot);
    color: var(--espresso);
    align-self: flex-start;
    border-bottom-left-radius: 5px;
    font-weight: 400;
  }

  .bubble-bot .sender {
    font-size: 10px;
    font-weight: 500;
    color: var(--caramel);
    margin-bottom: 3px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .bubble-user {
    background: var(--chat-user);
    color: var(--cream);
    align-self: flex-end;
    border-bottom-right-radius: 5px;
    font-weight: 300;
  }

  /* Typing indicator */
  .typing-bubble {
    background: var(--chat-bot);
    align-self: flex-start;
    border-radius: 18px;
    border-bottom-left-radius: 5px;
    padding: 12px 18px;
    display: none;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble.show { display: flex; }

  .typing-bubble span {
    width: 6px; height: 6px;
    background: var(--caramel);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* INPUT ROW */
  .input-row {
    padding: 10px 16px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid rgba(92,51,23,0.08);
    flex-shrink: 0;
  }

  .text-input {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid rgba(92,51,23,0.12);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--espresso);
    outline: none;
    transition: border-color 0.2s;
  }

  .text-input::placeholder { color: rgba(92,51,23,0.35); }
  .text-input:focus { border-color: var(--caramel); }

  .send-btn {
    width: 38px; height: 38px;
    background: var(--roast);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:active { transform: scale(0.92); }

  .send-btn svg { fill: var(--cream); }

  /* MIC BUTTON AREA */
  .mic-area {
    padding: 10px 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .mic-hint {
    font-size: 11px;
    color: rgba(92,51,23,0.4);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .mic-wrapper {
    position: relative;
    width: 76px; height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Wave rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--caramel);
    opacity: 0;
    pointer-events: none;
  }

  .mic-btn.listening ~ .ring-1,
  .mic-btn.listening ~ .ring-2,
  .mic-btn.listening ~ .ring-3 { animation: ring-out 1.6s infinite ease-out; }

  .mic-btn.listening ~ .ring-1 { animation-delay: 0s; }
  .mic-btn.listening ~ .ring-2 { animation-delay: 0.4s; }
  .mic-btn.listening ~ .ring-3 { animation-delay: 0.8s; }

  @keyframes ring-out {
    0% { width: 76px; height: 76px; opacity: 0.6; }
    100% { width: 140px; height: 140px; opacity: 0; }
  }

  .mic-btn {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: var(--espresso);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
    transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
    box-shadow: 0 4px 16px rgba(44,26,14,0.3);
  }

  .mic-btn:active { transform: scale(0.93); }

  .mic-btn.listening {
    background: var(--caramel);
    box-shadow: 0 4px 24px rgba(200,133,74,0.5);
  }

  .mic-btn svg { transition: fill 0.25s; fill: var(--cream); }

  /* Responsive – mobile real */
  @media (max-width: 400px) {
    body { background: var(--foam); align-items: flex-start; }
    .phone {
      width: 100vw; height: 100dvh;
      border-radius: 0;
      box-shadow: none;
    }
    .phone::before { display: none; }
  }
</style>
</head>
<body>

<div class="phone">

  <div class="header">
    <div class="header-texture"></div>
    <div class="brand-row">
      <div class="brand-dot"></div>
      <span class="brand-label">ExpressBot · UMB</span>
    </div>
    <div class="greeting">¡Hola, <span>Manuelista!</span><br>Bienvenido a la barra Express</div>
    <div class="subline">Tu café favorito, en segundos &nbsp;☕</div>
  </div>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Listo para ordenar</span>
    </div>
    <button class="clear-btn" onclick="clearChat()">Limpiar</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="typing-bubble" id="typingBubble">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="input-row">
    <input class="text-input" id="textInput" type="text" placeholder="Escribe tu pedido…" autocomplete="off">
    <button class="send-btn" onclick="sendText()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="mic-area">
    <span class="mic-hint" id="micHint">Presiona para hablar</span>
    <div class="mic-wrapper">
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <svg width="26" height="26" viewBox="0 0 24 24">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
        </svg>
      </button>
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
  </div>

</div>

<script>
        const API_KEY = "VF.DM.6a13718d494cf67a6341a734.zT23heSi4rB6BGEZ";
        const VERSION_ID = "6a1365e1a3685663962abda1";
        const USER_ID = "user_" + Date.now();

        const log = (...a) => console.log('[ExpressBot]', ...a);
        const err = (...a) => console.error('[ExpressBot ERROR]', ...a);

        let isListening = false;
        let recognition = null;
        let sessionStarted = false;
        let isFetching = false; // guard doble envío

        // --- UI helpers ---
        function setStatus(text, state) {
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            dot.className = 'status-dot' + (state ? ' ' + state : '');
        }

        function showTyping(show) {
            const t = document.getElementById('typingBubble');
            t.classList.toggle('show', show);
            if (show) scrollBottom();
        }

        function scrollBottom() {
            const c = document.getElementById('chatArea');
            setTimeout(() => c.scrollTop = c.scrollHeight, 50);
        }

        function addBubble(text, from) {
            const chat = document.getElementById('chatArea');
            const typing = document.getElementById('typingBubble');
            const div = document.createElement('div');
            div.className = 'bubble bubble-' + from;
            if (from === 'bot') {
                div.innerHTML = `<div class="sender">ExpressBot</div>${escapeHtml(text)}`;
            } else {
                div.textContent = text;
            }
            chat.insertBefore(div, typing);
            scrollBottom();
        }

        function escapeHtml(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function clearChat() {
            const chat = document.getElementById('chatArea');
            const typing = document.getElementById('typingBubble');
            [...chat.children].forEach(c => { if (c !== typing) c.remove(); });
            sessionStarted = false;
            isFetching = false;
            setStatus('Listo para ordenar', '');
            resetInput();
            log('Chat limpiado');
        }

        function resetInput() {
            const i = document.getElementById('textInput');
            i.value = '';
            i.placeholder = 'Escribe tu pedido…';
        }

        // --- Voiceflow: endpoint estándar runtime ---
        async function interact(payload) {
            if (isFetching) { log('Petición bloqueada — ya hay una en curso'); return; }
            isFetching = true;
            showTyping(true);
            log('Enviando payload →', JSON.stringify(payload));

            try {
                const url = `https://general-runtime.voiceflow.com/state/user/${USER_ID}/interact?versionID=${VERSION_ID}`;
                log('URL →', url);

                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': API_KEY,
                        'Content-Type': 'application/json',
                        'versionID': VERSION_ID
                    },
                    body: JSON.stringify({ action: payload })
                });

                log('HTTP status →', res.status);
                const raw = await res.text();
                log('Respuesta raw →', raw);

                const data = JSON.parse(raw);
                showTyping(false);

                if (!Array.isArray(data)) {
                    err('Respuesta inesperada (no es array):', data);
                    addBubble('Respuesta inesperada del servidor.', 'bot');
                    return;
                }

                const speaks = data.filter(t => t.type === 'text' || t.type === 'speak');
                log(`Tramas totales: ${data.length}, mensajes: ${speaks.length}`);

                if (speaks.length === 0) {
                    const types = data.map(t => t.type).join(', ');
                    log('Tipos recibidos sin mensaje:', types);
                    addBubble('(Sin respuesta — revisa el flujo en Voiceflow)', 'bot');
                    return;
                }

                const fullText = speaks
                    .map(s => s.payload?.message || s.payload?.slate?.content?.[0]?.children?.[0]?.text || '')
                    .filter(Boolean)
                    .join(' ');

                log('Texto final →', fullText);
                addBubble(fullText, 'bot');
                speak(fullText);

            } catch (e) {
                err('fetch falló:', e);
                showTyping(false);
                addBubble('Error de conexión ☕ — revisa la consola.', 'bot');
                setStatus('Error', '');
            } finally {
                isFetching = false;
            }
        }

        function launch() {
            sessionStarted = true;
            setStatus('Conectado', 'active');
            log('Lanzando sesión — USER_ID:', USER_ID);
            interact({ type: 'launch' });
        }

        // --- Text input ---
        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;
            resetInput();
            addBubble(text, 'user');
            if (!sessionStarted) { sessionStarted = true; setStatus('Conectado', 'active'); }
            log('Enviando texto:', text);
            interact({ type: 'text', payload: text });
        }

        document.getElementById('textInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendText();
        });

        // --- Cartesia TTS via Netlify proxy ---
        let currentAudio = null;

        async function speak(text) {
            try {
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                log('TTS →', text.substring(0, 50));
                const res = await fetch('/.netlify/functions/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                log('TTS status →', res.status);
                if (!res.ok) { err('TTS falló:', await res.text()); return; }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                currentAudio = new Audio(url);
                currentAudio.play();
                currentAudio.onended = () => URL.revokeObjectURL(url);
            } catch(e) {
                err('TTS error:', e);
            }
        }

        // --- Mic ---
        function toggleMic() {
            if (!sessionStarted) launch();

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                setStatus('Micrófono no disponible', '');
                document.getElementById('micHint').textContent = 'Usa el teclado';
                err('SpeechRecognition no disponible en este navegador');
                return;
            }

            isListening ? stopListening() : startListening();
        }

        function startListening() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.lang = 'es-CO';
            recognition.interimResults = true;   // ← auto-edita mientras hablas
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('micHint').textContent = 'Escuchando…';
                document.getElementById('textInput').placeholder = 'Habla ahora…';
                setStatus('Escuchando…', 'listening');
                log('Micrófono ON');
            };

            // Muestra texto provisional mientras hablas (sin enviar)
            recognition.onresult = e => {
                const input = document.getElementById('textInput');
                const result = e.results[e.results.length - 1];
                const transcript = result[0].transcript;

                if (!result.isFinal) {
                    // Solo actualiza el placeholder visual
                    input.placeholder = transcript;
                } else {
                    // Resultado final → enviar UNA sola vez
                    input.placeholder = 'Escribe tu pedido…';
                    const text = transcript.trim();
                    if (!text) return;
                    log('Reconocido final:', text);
                    addBubble(text, 'user');
                    interact({ type: 'text', payload: text });
                }
            };

            recognition.onerror = e => { err('Error micrófono:', e.error); stopListening(); };
            recognition.onend = () => { log('Micrófono OFF'); stopListening(); };
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            if (recognition) { try { recognition.stop(); } catch(e) {} }
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('micHint').textContent = 'Presiona para hablar';
            document.getElementById('textInput').placeholder = 'Escribe tu pedido…';
            if (sessionStarted) setStatus('Conectado', 'active');
        }

    </script>
</body>
</html>
